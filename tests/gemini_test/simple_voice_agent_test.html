<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple Voice Agent Test</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 820px; margin: 20px auto; padding: 0 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    input[type="text"] { flex: 1; min-width: 240px; padding: 8px; }
    button, input[type="file"] { padding: 8px; }
    pre { background: #111; color: #ddd; padding: 12px; min-height: 320px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Simple Voice Agent Test</h2>
  <div class="row">
    <button id="connect">Connect</button>
    <button id="startMic">Start Mic</button>
    <button id="stopMic">Stop Mic</button>
    <input id="imageInput" type="file" accept="image/*" />
  </div>
  <div class="row">
    <input id="textInput" type="text" placeholder="Type a message..." />
    <button id="sendText">Send</button>
  </div>
  <pre id="log"></pre>

  <script>
    let ws = null;
    let audioInCtx = null;
    let outputCtx = null;
    let micStream = null;
    let sourceNode = null;
    let processorNode = null;
    let nextPlayTime = 0;
    let activeSources = new Set();
    let vadInSpeech = false;
    let vadSilenceMs = 0;

    const VAD_RMS_THRESHOLD = 0.015;
    const VAD_SILENCE_MS = 650;

    const logEl = document.getElementById("log");
    const textInput = document.getElementById("textInput");
    const imageInput = document.getElementById("imageInput");

    function log(msg) {
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    function randomSessionId() {
      return "session-" + Math.random().toString(36).slice(2);
    }

    function floatTo16BitPcmBuffer(float32Array) {
      const pcm = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
      }
      return pcm.buffer;
    }

    function playPcm16(base64Pcm) {
      if (!outputCtx) {
        outputCtx = new AudioContext({ sampleRate: 24000 });
      }
      const raw = atob(base64Pcm);
      const samples = raw.length / 2;
      const floatData = new Float32Array(samples);
      for (let i = 0; i < samples; i++) {
        const lo = raw.charCodeAt(i * 2);
        const hi = raw.charCodeAt(i * 2 + 1);
        let val = (hi << 8) | lo;
        if (val >= 32768) val -= 65536;
        floatData[i] = val / 32768;
      }

      const buffer = outputCtx.createBuffer(1, samples, 24000);
      buffer.copyToChannel(floatData, 0);
      const src = outputCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(outputCtx.destination);
      activeSources.add(src);
      src.onended = () => {
        activeSources.delete(src);
        try { src.disconnect(); } catch {}
      };
      const startAt = Math.max(outputCtx.currentTime, nextPlayTime);
      src.start(startAt);
      nextPlayTime = startAt + buffer.duration;
    }

    function stopAllPlayback(reason) {
      for (const src of activeSources) {
        try { src.stop(); } catch {}
        try { src.disconnect(); } catch {}
      }
      activeSources.clear();
      if (outputCtx) nextPlayTime = outputCtx.currentTime;
      if (reason) log(reason);
    }

    async function startMic() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("Connect first.");
        return;
      }
      if (processorNode) return;

      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioInCtx = new AudioContext({ sampleRate: 16000 });
      sourceNode = audioInCtx.createMediaStreamSource(micStream);
      processorNode = audioInCtx.createScriptProcessor(4096, 1, 1);
      processorNode.onaudioprocess = (event) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const mono = event.inputBuffer.getChannelData(0);
        let sum = 0;
        for (let i = 0; i < mono.length; i++) sum += mono[i] * mono[i];
        const rms = Math.sqrt(sum / mono.length);
        const chunkMs = (mono.length / 16000) * 1000;

        if (rms >= VAD_RMS_THRESHOLD) {
          vadSilenceMs = 0;
          if (!vadInSpeech) {
            ws.send(JSON.stringify({ type: "activity_start" }));
            stopAllPlayback("[playback] stopped (user speech)");
            vadInSpeech = true;
            log("[vad] speech start");
          }
        } else if (vadInSpeech) {
          vadSilenceMs += chunkMs;
          if (vadSilenceMs >= VAD_SILENCE_MS) {
            ws.send(JSON.stringify({ type: "activity_end" }));
            vadInSpeech = false;
            vadSilenceMs = 0;
            log("[vad] speech end");
          }
        }

        ws.send(floatTo16BitPcmBuffer(mono));
      };
      sourceNode.connect(processorNode);
      processorNode.connect(audioInCtx.destination);
      log("Mic started.");
    }

    function stopMic() {
      if (ws && ws.readyState === WebSocket.OPEN && vadInSpeech) {
        ws.send(JSON.stringify({ type: "activity_end" }));
      }
      vadInSpeech = false;
      vadSilenceMs = 0;
      if (processorNode) processorNode.disconnect();
      if (sourceNode) sourceNode.disconnect();
      if (micStream) micStream.getTracks().forEach(t => t.stop());
      if (audioInCtx) audioInCtx.close();
      processorNode = null;
      sourceNode = null;
      micStream = null;
      audioInCtx = null;
      log("Mic stopped.");
    }

    document.getElementById("connect").onclick = () => {
      if (ws && ws.readyState === WebSocket.OPEN) return;
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const sessionId = randomSessionId();
      ws = new WebSocket(`${proto}://${location.host}/ws/demo-user/${sessionId}`);
      ws.onopen = () => log("WebSocket connected.");
      ws.onclose = () => log("WebSocket closed.");
      ws.onerror = (e) => log("WebSocket error: " + e.type);
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.interrupted) {
            stopAllPlayback("[agent] interrupted");
          }
          if (msg.text) log(`[${msg.author}] ${msg.text}`);
          if (msg.audio_b64) playPcm16(msg.audio_b64);
          if (msg.turn_complete) log("[turn complete]");
        } catch (e) {
          log("Bad server message.");
        }
      };
    };

    document.getElementById("sendText").onclick = () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const text = textInput.value.trim();
      if (!text) return;
      ws.send(JSON.stringify({ type: "text", text }));
      log(`[you] ${text}`);
      textInput.value = "";
    };

    document.getElementById("startMic").onclick = startMic;
    document.getElementById("stopMic").onclick = stopMic;

    imageInput.addEventListener("change", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log("Connect first.");
        return;
      }
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const result = String(reader.result);
        const base64 = result.split(",")[1];
        ws.send(JSON.stringify({
          type: "image",
          mimeType: file.type || "image/jpeg",
          data: base64
        }));
        log(`[you] sent image: ${file.name}`);
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
