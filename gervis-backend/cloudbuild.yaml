steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:latest'
      - '.'
    dir: 'gervis-backend'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend'

  # Update the migration job image to the newly built image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - gervis-migrate
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${_IMAGE_TAG}'
      - '--region=${_REGION}'

  # Execute Alembic migrations and wait for completion
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - gervis-migrate
      - '--region=${_REGION}'
      - '--wait'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gervis-backend
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${_IMAGE_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=gervis-backend@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--min-instances=1'
      - '--memory=1Gi'
      - '--timeout=3600'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,BACKEND_BASE_URL=BACKEND_BASE_URL:latest,OPIK_API_KEY=OPIK_API_KEY:latest,INTEGRATION_ENCRYPTION_KEY=INTEGRATION_ENCRYPTION_KEY:latest'
      - '--set-env-vars=ENVIRONMENT=production,GCP_PROJECT=${PROJECT_ID},CLOUD_TASKS_QUEUE=backend-jobs,CLOUD_TASKS_LOCATION=${_REGION},CLOUD_RUN_SERVICE_ACCOUNT=gervis-backend@${PROJECT_ID}.iam.gserviceaccount.com,ENABLE_TRACING=cloud,OPIK_WORKSPACE=javier-peres,OPIK_PROJECT_NAME=gervis'
      - '--allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _REPO: gervis
  _IMAGE_TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
