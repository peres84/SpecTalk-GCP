steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:latest'
      - '.'
    dir: 'gervis-backend'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend'

  # Run Alembic migrations as a Cloud Run Job before deploying new revision
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - gervis-migrate
      - '--region=${_REGION}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${SHORT_SHA}'
      - '--wait'
    # Override container command to run Alembic instead of the app server
    # The Cloud Run Job 'gervis-migrate' must be pre-created with:
    #   --command="uv" --args="run,alembic,upgrade,head"

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gervis-backend
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gervis-backend:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--min-instances=1'
      - '--timeout=3600'
      - '--set-secrets=JWT_SECRET=JWT_SECRET:latest,DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,BACKEND_BASE_URL=BACKEND_BASE_URL:latest'
      - '--set-env-vars=ENVIRONMENT=production,GCP_PROJECT=${PROJECT_ID},CLOUD_TASKS_QUEUE=backend-jobs,CLOUD_TASKS_LOCATION=${_REGION},CLOUD_RUN_SERVICE_ACCOUNT=${_SERVICE_ACCOUNT},ENABLE_TRACING=cloud'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _REPO: gervis
  _SERVICE_ACCOUNT: gervis-backend@${PROJECT_ID}.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
